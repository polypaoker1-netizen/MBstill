<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBstill - Новая Нейросеть</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #10a37f;
            --bg-color: #ffffff;
            --sidebar-bg: #f7f7f8;
            --text-primary: #343541;
            --text-secondary: #6e6e80;
            --border-color: #e5e5e5;
            --hover-bg: #f5f5f5;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-color);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 260px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 12px;
            border-bottom: 1px solid var(--border-color);
        }

        .new-chat-btn {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            transition: background 0.2s;
        }

        .new-chat-btn:hover {
            background: var(--hover-bg);
        }

        .chat-history {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .chat-item {
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 4px;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: background 0.2s;
        }

        .chat-item:hover {
            background: var(--hover-bg);
        }

        .chat-item.active {
            background: var(--hover-bg);
        }

        .user-profile {
            padding: 12px;
            border-top: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .user-profile:hover {
            background: var(--hover-bg);
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--primary-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .user-info {
            flex: 1;
        }

        .user-name {
            font-weight: 600;
            font-size: 14px;
        }

        .sidebar-footer {
            padding: 12px;
            border-top: 1px solid var(--border-color);
        }

        .admin-link {
            display: block;
            padding: 12px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .admin-link:hover {
            background: var(--hover-bg);
            color: var(--text-primary);
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 20px;
            font-weight: 700;
            color: var(--primary-color);
        }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }

        .welcome-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            height: 100%;
            padding: 40px;
        }

        .welcome-logo {
            font-size: 48px;
            margin-bottom: 24px;
        }

        .welcome-title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .welcome-subtitle {
            font-size: 16px;
            color: var(--text-secondary);
            max-width: 600px;
            line-height: 1.6;
        }

        .message {
            display: flex;
            gap: 16px;
            max-width: 800px;
            margin: 0 auto 24px;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .user-message .message-avatar {
            background: var(--primary-color);
            color: white;
        }

        .ai-message .message-avatar {
            background: var(--sidebar-bg);
            border: 1px solid var(--border-color);
        }

        .message-content {
            flex: 1;
        }

        .message-author {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 4px;
        }

        .message-text {
            line-height: 1.6;
            font-size: 15px;
        }

        .message-time {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 8px;
        }

        .input-area {
            padding: 24px;
            border-top: 1px solid var(--border-color);
        }

        .input-container {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
        }

        .message-input {
            width: 100%;
            padding: 16px 50px 16px 20px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            font-size: 15px;
            resize: none;
            outline: none;
            font-family: inherit;
            min-height: 56px;
            max-height: 200px;
        }

        .message-input:focus {
            border-color: var(--primary-color);
        }

        .send-btn {
            position: absolute;
            right: 12px;
            bottom: 12px;
            width: 32px;
            height: 32px;
            border: none;
            background: var(--primary-color);
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .typing-indicator {
            display: none;
            padding: 12px 24px;
            color: var(--text-secondary);
            font-style: italic;
        }

        .typing-indicator.visible {
            display: block;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 32px;
            max-width: 500px;
            width: 90%;
        }

        .modal-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
        }

        .form-input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 15px;
        }

        .emoji-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 8px;
            margin-top: 12px;
        }

        .emoji-option {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            border: 2px solid transparent;
            border-radius: 8px;
            cursor: pointer;
        }

        .emoji-option:hover {
            background: var(--hover-bg);
        }

        .emoji-option.selected {
            border-color: var(--primary-color);
            background: var(--hover-bg);
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-primary {
            background: var(--primary-color);
            color: white;
        }

        .btn-secondary {
            background: var(--sidebar-bg);
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <button class="new-chat-btn" onclick="startNewChat()">
                    <span>➕</span>
                    <span>Новый чат</span>
                </button>
            </div>
            
            <div class="chat-history" id="chatHistory">
                <div class="loading">Загрузка...</div>
            </div>
            
            <div class="user-profile" onclick="openProfileModal()">
                <div class="user-avatar" id="userAvatarDisplay">👤</div>
                <div class="user-info">
                    <div class="user-name" id="userNameDisplay">Гость</div>
                </div>
            </div>
            
            <div class="sidebar-footer">
                <a href="#" class="admin-link" onclick="showAdminLogin(event)">
                    🔐 Админ панель
                </a>
            </div>
        </aside>

        <main class="main-content">
            <header class="header">
                <div class="logo">MBstill</div>
            </header>

            <div class="chat-area" id="chatArea">
                <div class="welcome-screen" id="welcomeScreen">
                    <div class="welcome-logo">🤖</div>
                    <h1 class="welcome-title">Добро пожаловать в MBstill</h1>
                    <p class="welcome-subtitle">Новая мощная нейросеть</p>
                </div>
                
                <div id="messagesContainer" style="display: none;"></div>
            </div>

            <div class="typing-indicator" id="typingIndicator">MBstill печатает...</div>

            <div class="input-area">
                <div class="input-container">
                    <textarea 
                        class="message-input" 
                        id="messageInput" 
                        placeholder="Напишите сообщение..."
                        onkeydown="handleKeyDown(event)"
                    ></textarea>
                    <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>➤</button>
                </div>
            </div>
        </main>
    </div>

    <!-- Profile Modal -->
    <div class="modal" id="profileModal">
        <div class="modal-content">
            <h2 class="modal-title">Настройки профиля</h2>
            <div class="form-group">
                <label class="form-label">Ваш никнейм</label>
                <input type="text" class="form-input" id="profileName" maxlength="30">
            </div>
            <div class="form-group">
                <label class="form-label">Аватарка</label>
                <div class="emoji-grid" id="emojiGrid"></div>
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeProfileModal()">Отмена</button>
                <button class="btn btn-primary" onclick="saveProfile()">Сохранить</button>
            </div>
        </div>
    </div>

    <script>
        // ⚠️ ЗАМЕНИТЕ ЭТО НА СВОЙ BIN ID И API KEY!
        const BIN_ID = 'ВАШ_BIN_ID'; // Получите на jsonbin.io
        const API_KEY = 'ВАШ_API_KEY'; // Ваш master key
        
        let currentChatId = null;
        let allData = { chats: [], users: {} };
        let userProfile = { name: 'Гость', avatar: '👤', userId: generateUserId() };
        let selectedEmoji = userProfile.avatar;

        const emojis = ['😀', '😎', '🤖', '👽', '🦊', '🐱', '🐶', '🦁', '🐼', '🐨', '🐯', '🐸', '🦄', '🐙', '🦋', '🌟', '⚡', '🔥', '💎', '🎮'];

        function generateUserId() {
            return 'user_' + Math.random().toString(36).substr(2, 9);
        }

        // Load data from server
        async function loadData() {
            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                    headers: {
                        'X-Master-Key': API_KEY
                    }
                });
                const result = await response.json();
                allData = result.record || { chats: [], users: {} };
                
                // Load user profile
                if (allData.users[userProfile.userId]) {
                    userProfile = allData.users[userProfile.userId];
                } else {
                    allData.users[userProfile.userId] = userProfile;
                }
                
                loadUserProfile();
                loadChatHistory();
                generateEmojiGrid();
            } catch (error) {
                console.error('Error loading data:', error);
                document.getElementById('chatHistory').innerHTML = '<div class="loading">Ошибка загрузки</div>';
            }
        }

        // Save data to server
        async function saveData() {
            try {
                await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': API_KEY
                    },
                    body: JSON.stringify(allData)
                });
            } catch (error) {
                console.error('Error saving data:', error);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadData();
            
            document.getElementById('messageInput').addEventListener('input', function() {
                document.getElementById('sendBtn').disabled = !this.value.trim();
            });
        });

        function loadUserProfile() {
            document.getElementById('userNameDisplay').textContent = userProfile.name;
            document.getElementById('userAvatarDisplay').textContent = userProfile.avatar;
            document.getElementById('profileName').value = userProfile.name;
            selectedEmoji = userProfile.avatar;
        }

        function generateEmojiGrid() {
            const grid = document.getElementById('emojiGrid');
            grid.innerHTML = emojis.map(emoji => `
                <div class="emoji-option ${emoji === selectedEmoji ? 'selected' : ''}" 
                     onclick="selectEmoji('${emoji}')">${emoji}</div>
            `).join('');
        }

        function selectEmoji(emoji) {
            selectedEmoji = emoji;
            document.querySelectorAll('.emoji-option').forEach(el => {
                el.classList.toggle('selected', el.textContent === emoji);
            });
        }

        function openProfileModal() {
            document.getElementById('profileModal').classList.add('active');
        }

        function closeProfileModal() {
            document.getElementById('profileModal').classList.remove('active');
            loadUserProfile();
        }

        async function saveProfile() {
            const name = document.getElementById('profileName').value.trim() || 'Гость';
            userProfile = { ...userProfile, name, avatar: selectedEmoji };
            allData.users[userProfile.userId] = userProfile;
            await saveData();
            loadUserProfile();
            closeProfileModal();
        }

        async function startNewChat() {
            currentChatId = Date.now().toString();
            const newChat = {
                id: currentChatId,
                title: 'Новый чат',
                messages: [],
                userId: userProfile.userId,
                userName: userProfile.name,
                userAvatar: userProfile.avatar,
                createdAt: new Date().toISOString()
            };
            
            allData.chats.push(newChat);
            await saveData();
            loadChatHistory();
            showChat(currentChatId);
        }

        function showChat(chatId) {
            currentChatId = chatId;
            const chat = allData.chats.find(c => c.id === chatId);
            
            if (!chat) return;
            
            document.getElementById('welcomeScreen').style.display = 'none';
            document.getElementById('messagesContainer').style.display = 'block';
            
            renderMessages(chat.messages);
            updateActiveChat(chatId);
        }

        function renderMessages(messages) {
            const container = document.getElementById('messagesContainer');
            container.innerHTML = messages.map(msg => {
                const isUser = msg.role === 'user';
                const avatar = isUser ? (msg.userAvatar || '👤') : '🤖';
                const author = isUser ? (msg.userName || 'Пользователь') : 'MBstill';
                
                return `
                    <div class="message ${msg.role}-message">
                        <div class="message-avatar">${avatar}</div>
                        <div class="message-content">
                            <div class="message-author">${escapeHtml(author)}</div>
                            <div class="message-text">${escapeHtml(msg.content)}</div>
                            <div class="message-time">${formatTime(msg.timestamp)}</div>
                        </div>
                    </div>
                `;
            }).join('');
            
            scrollToBottom();
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const content = input.value.trim();
            if (!content) return;
            
            if (!currentChatId) {
                await startNewChat();
            }
            
            const chat = allData.chats.find(c => c.id === currentChatId);
            if (!chat) return;
            
            // Add user message
            chat.messages.push({
                role: 'user',
                content: content,
                timestamp: new Date().toISOString(),
                userName: userProfile.name,
                userAvatar: userProfile.avatar,
                userId: userProfile.userId
            });
            
            if (chat.messages.length === 1) {
                chat.title = content.substring(0, 30) + (content.length > 30 ? '...' : '');
            }
            
            await saveData();
            loadChatHistory();
            
            if (document.getElementById('welcomeScreen').style.display !== 'none') {
                document.getElementById('welcomeScreen').style.display = 'none';
                document.getElementById('messagesContainer').style.display = 'block';
            }
            
            renderMessages(chat.messages);
            input.value = '';
            document.getElementById('sendBtn').disabled = true;
            
            // Simulate AI response
            document.getElementById('typingIndicator').classList.add('visible');
            setTimeout(async () => {
                document.getElementById('typingIndicator').classList.remove('visible');
                
                chat.messages.push({
                    role: 'assistant',
                    content: 'Привет! Это демо-ответ.',
                    timestamp: new Date().toISOString()
                });
                
                await saveData();
                renderMessages(chat.messages);
            }, 1500);
        }

        function handleKeyDown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        function loadChatHistory() {
            const container = document.getElementById('chatHistory');
            const userChats = allData.chats
                .filter(c => c.userId === userProfile.userId)
                .sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
            
            if (userChats.length === 0) {
                container.innerHTML = '<div style="padding: 12px; color: var(--text-secondary);">Нет чатов</div>';
                return;
            }
            
            container.innerHTML = userChats.map(chat => `
                <div class="chat-item ${chat.id === currentChatId ? 'active' : ''}" 
                     onclick="showChat('${chat.id}')">
                    ${escapeHtml(chat.title)}
                </div>
            `).join('');
        }

        function updateActiveChat(chatId) {
            document.querySelectorAll('.chat-item').forEach(item => {
                item.classList.remove('active');
            });
        }

        function scrollToBottom() {
            const area = document.getElementById('chatArea');
            area.scrollTop = area.scrollHeight;
        }

        function showAdminLogin(event) {
            event.preventDefault();
            const password = prompt('Пароль администратора:');
            if (password === 'admin123') {
                window.location.href = 'admin.html';
            } else if (password !== null) {
                alert('Неверный пароль!');
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatTime(timestamp) {
            return new Date(timestamp).toLocaleTimeString('ru-RU', { 
                hour: '2-digit', 
                minute: '2-digit' 
            });
        }

        document.getElementById('profileModal').addEventListener('click', (e) => {
            if (e.target.id === 'profileModal') closeProfileModal();
        });
    </script>
</body>
</html>
